<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语盲盒宠物游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            width: 375px;
            height: 667px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* 顶部信息栏 */
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            color: white;
        }

        .score, .coins {
            font-size: 16px;
            font-weight: bold;
        }

        /* 宠物区域 */
        .pet-area {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #667eea;
        }

        .pet-sprite {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pet-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .pet-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .stat {
            background: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            color: #666;
        }

        .feed-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .feed-btn:hover {
            transform: scale(1.05);
        }

        /* 游戏区域 */
        .game-area {
            width: 100%;
            height: 250px;
            position: relative;
            overflow: hidden;
            background: #f8f9fa;
        }

        .falling-word {
            position: absolute;
            top: -50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            animation: fall linear forwards;
        }

        @keyframes fall {
            from { transform: translateY(-50px); }
            to { transform: translateY(300px); }
        }

        /* 选项区域 */
        .options-area {
            padding: 15px;
            background: white;
            border-top: 2px solid #eee;
        }

        .option-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #11998e, #38ef7d) !important;
            color: white;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #eb3349, #f45c43) !important;
            color: white;
        }

        /* 商店按钮 */
        .shop-btn {
            position: absolute;
            bottom: 170px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 10px 40px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
        }

        /* 消息提示 */
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            z-index: 1000;
            display: none;
        }

        /* 商店页面 */
        .shop-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 200;
            display: none;
            overflow-y: auto;
        }

        .shop-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
        }

        .shop-items {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .shop-item {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }

        .shop-item:hover {
            transform: scale(1.05);
        }

        .shop-item-emoji {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .shop-item-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .shop-item-price {
            color: #f5576c;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .buy-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }

        .buy-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 顶部信息 -->
        <div class="header">
            <span class="score">Score: <span id="scoreValue">0</span></span>
            <span class="coins">Coins: <span id="coinValue">0</span></span>
        </div>

        <!-- 宠物区域 -->
        <div class="pet-area">
            <div class="pet-sprite" id="petSprite">🐱</div>
            <div class="pet-name" id="petName">苹果猫</div>
            <div class="pet-stats">
                <span class="stat">🍖 饥饿：<span id="hungerValue">100</span></span>
                <span class="stat">⭐ Lv.<span id="levelValue">1</span></span>
            </div>
            <button class="feed-btn" onclick="feedPet()">🍎 喂养</button>
        </div>

        <!-- 游戏区域 -->
        <div class="game-area" id="gameArea">
            <div class="message" id="message"></div>
        </div>

        <!-- 商店按钮 -->
        <button class="shop-btn" onclick="openShop()">🏪 商店</button>

        <!-- 选项区域 -->
        <div class="options-area" id="optionsArea">
            <!-- 选项按钮会动态生成 -->
        </div>

        <!-- 商店页面 -->
        <div class="shop-page" id="shopPage">
            <div class="shop-header">
                <span>🏪 宠物商店</span>
                <button class="close-btn" onclick="closeShop()">✕ 关闭</button>
            </div>
            <div class="shop-items" id="shopItems">
                <!-- 商店物品会动态生成 -->
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
